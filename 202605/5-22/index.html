<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI任务流管理系统</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div>
          <h1>AI任务流管理系统</h1>
          <p>覆盖请求、响应、接口、Service、状态机、任务表与操作日志表的最小可用版本</p>
        </div>
        <button id="openCreate" class="btn btn-primary">新建任务</button>
      </header>

      <section class="stats" aria-label="任务统计">
        <article class="stat-card">
          <span class="stat-label">进行中</span>
          <strong id="runningCount">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">待确认</span>
          <strong id="pendingCount">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">今日完成</span>
          <strong id="completedTodayCount">0</strong>
        </article>
        <article class="stat-card stat-card-danger">
          <span class="stat-label">异常</span>
          <strong id="failedCount">0</strong>
        </article>
      </section>

      <section class="toolbar" aria-label="搜索筛选">
        <input id="keywordInput" type="text" placeholder="搜索任务名称 / 负责人 / 智能体" />
        <select id="statusFilter">
          <option value="all">全部状态</option>
          <option value="running">进行中</option>
          <option value="pending_confirm">待确认</option>
          <option value="completed">已完成</option>
          <option value="failed">异常</option>
        </select>
        <select id="priorityFilter">
          <option value="all">全部优先级</option>
          <option value="high">高优先级</option>
          <option value="medium">中优先级</option>
          <option value="low">低优先级</option>
        </select>
        <button id="resetFilters" class="btn btn-ghost">重置筛选</button>
      </section>

      <main class="content">
        <section class="table-panel">
          <table>
            <thead>
              <tr>
                <th>任务名称</th>
                <th>状态</th>
                <th>优先级</th>
                <th>负责人</th>
                <th>智能体</th>
                <th>创建时间</th>
                <th>更新时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="taskRows"></tbody>
          </table>
          <div id="emptyState" class="empty hidden">没有找到匹配的任务</div>
        </section>

        <aside class="detail-panel">
          <h2>任务详情</h2>
          <div id="detailEmpty" class="empty">请选择一个任务查看详情</div>
          <div id="detailBody" class="hidden">
            <h3 id="detailTitle"></h3>
            <p id="detailDescription"></p>
            <dl class="detail-grid">
              <div><dt>当前状态</dt><dd id="detailStatus"></dd></div>
              <div><dt>优先级</dt><dd id="detailPriority"></dd></div>
              <div><dt>负责人</dt><dd id="detailAssignee"></dd></div>
              <div><dt>智能体</dt><dd id="detailAgent"></dd></div>
            </dl>

            <div class="detail-block">
              <h4>执行步骤</h4>
              <ul id="detailSteps" class="steps"></ul>
            </div>

            <div class="detail-block">
              <h4>备注</h4>
              <p id="detailNote"></p>
            </div>

            <div class="detail-actions">
              <button id="markPendingBtn" class="btn btn-ghost">标记待确认</button>
              <button id="markCompletedBtn" class="btn btn-primary">标记完成</button>
            </div>
          </div>
        </aside>
      </main>

      <section class="logs-panel">
        <h2>操作日志（ai_task_operation_log）</h2>
        <table>
          <thead>
            <tr>
              <th>时间</th>
              <th>任务ID</th>
              <th>操作类型</th>
              <th>状态变化</th>
              <th>操作人</th>
              <th>备注</th>
            </tr>
          </thead>
          <tbody id="logRows"></tbody>
        </table>
      </section>
    </div>

    <dialog id="taskDialog" class="task-dialog">
      <form id="taskForm" method="dialog">
        <h3 id="dialogTitle">新建任务</h3>
        <input type="hidden" id="taskIdInput" />

        <label>任务名称<input id="titleInput" required /></label>
        <label>任务描述<textarea id="descriptionInput" required></textarea></label>
        <label>负责人<input id="assigneeInput" required /></label>
        <label>智能体<input id="agentInput" required /></label>
        <label>
          优先级
          <select id="priorityInput">
            <option value="high">高</option>
            <option value="medium" selected>中</option>
            <option value="low">低</option>
          </select>
        </label>
        <label>输入内容<textarea id="inputContentInput"></textarea></label>
        <label>备注<textarea id="noteInput"></textarea></label>

        <div class="dialog-actions">
          <button type="button" id="cancelDialog" class="btn btn-ghost">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
